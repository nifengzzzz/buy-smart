// ============ STATE ============
let activeFilters = new Set(); // multi-select
let searchQuery = '';
let selected = []; // indices into allProducts

// ============ RENDER ============
const catIcons = {phone:'📱',laptop:'💻',earphone:'🎧',appliance:'🏠',monitor:'🖥',gaming:'🎮',smarthome:'🤖',watch:'⌚',tablet:'📋',camera:'📷',keyboard:'⌨️',speaker:'🔊',storage:'💾',powerbank:'🔋',projector:'📽️'};

function renderPills(){
  const cats = [...new Set(allProducts.map(p=>p.cat))];
  const names = {};
  cats.forEach(c=>{names[c]=allProducts.find(p=>p.cat===c).catName;});
  document.getElementById('catPills').innerHTML = `
    <div class="cat-pill${activeFilters.size===0?' active':''}" onclick="toggleFilter('all')">
      全部
      <span class="count">${allProducts.length}</span>
    </div>
  ` + cats.map(c=>{
    const active = activeFilters.has(c);
    const count = allProducts.filter(p=>p.cat===c).length;
    return `<div class="cat-pill${active?' active':''}" onclick="toggleFilter('${c}')">
      ${catIcons[c]||''} ${names[c]}
      <span class="count">${count}</span>
    </div>`;
  }).join('');
}

function renderProducts(){
  let items = [...allProducts];
  if(activeFilters.size>0) items = items.filter(p=>activeFilters.has(p.cat));
  if(searchQuery){
    const q = searchQuery.toLowerCase();
    items = items.filter(p=>p.name.toLowerCase().includes(q)||p.catName.includes(q));
  }

  const grid = document.getElementById('productGrid');
  const empty = document.getElementById('emptyState');

  if(items.length===0){
    grid.innerHTML='';empty.style.display='block';return;
  }
  empty.style.display='none';

  grid.innerHTML = items.map(p=>{
    const idx = allProducts.indexOf(p);
    const isSel = selected.includes(idx);
    const min = Math.min(p.pdd,p.tb,p.jd);
    const deltaArrows = p.delta.map(d=>d>0?`↓${d}`:'').filter(Boolean);
    return `<div class="prod-card${isSel?' selected':''}" onclick="toggleSelect(${idx})">
      <div class="check">${isSel?'✓':''}</div>
      <div class="cat-tag">${catIcons[p.cat]||''} ${p.catName}</div>
      <div class="prod-name">${p.name}</div>
      <div class="price-row">
        <div class="price-item${p.pdd===min?' best':''}"><span class="plabel">拼多多</span><span class="pval">¥${p.pdd.toLocaleString()}</span></div>
        <div class="price-item${p.tb===min?' best':''}" onclick="event.stopPropagation();window.open(tbSearch('${encodeURIComponent(p.name)}'),'_blank')" style="cursor:pointer" title="在淘宝搜索此商品"><span class="plabel">淘宝</span><span class="pval">¥${p.tb.toLocaleString()}</span></div>
        <div class="price-item${p.jd===min?' best':''}" onclick="event.stopPropagation();window.open(jdSearch('${encodeURIComponent(p.name)}'),'_blank')" style="cursor:pointer" title="在京东搜索此商品"><span class="plabel">京东</span><span class="pval">¥${p.jd.toLocaleString()}</span></div>
      </div>
    </div>`;
  }).join('');
}

function renderCompare(){
  const slots = document.getElementById('compareSlots');
  const btn = document.getElementById('compareBtn');
  const max = 6;

  if(selected.length===0){
    slots.innerHTML = '<div class="cp-slot"><span class="empty-hint">点击左侧商品卡片添加</span></div>';
    btn.disabled = true;
  } else {
    slots.innerHTML = selected.map(idx=>{
      const p = allProducts[idx];
      return `<div class="cp-slot filled">
        <div class="slot-info">
          <div class="slot-name">${catIcons[p.cat]||''} ${p.name}</div>
          <div class="slot-prices">
            <span class="slot-price"><span class="plat-badge bpdd">拼多多</span> ¥${p.pdd}</span>
            <span class="slot-price"><span class="plat-badge btb">淘宝</span> ¥${p.tb}</span>
            <span class="slot-price"><span class="plat-badge bjd">京东</span> ¥${p.jd}</span>
          </div>
        </div>
        <button class="slot-remove" onclick="event.stopPropagation();removeItem(${idx})">✕</button>
      </div>`;
    }).join('');
    if(selected.length<max){
      slots.innerHTML += `<div class="cp-slot"><span class="empty-hint">还可添加 ${max-selected.length} 个</span></div>`;
    }
    btn.disabled = selected.length<2;
  }
}

function runCompare(){
  if(selected.length<2)return;
  const items = selected.map(i=>allProducts[i]);
  const platforms = [
    {key:'pdd',name:'拼多多',cls:'bpdd'},
    {key:'tb',name:'淘宝',cls:'btb'},
    {key:'jd',name:'京东',cls:'bjd'},
  ];
  const totals = platforms.map(plat=>{
    let sum=0;items.forEach(p=>sum+=p[plat.key]);
    return {...plat,total:sum};
  });
  const minTotal = Math.min(...totals.map(t=>t.total));
  const result = document.getElementById('cpResult');
  result.classList.add('show');
  result.innerHTML = `<h4>🏆 对比结果</h4>
  <div style="font-size:0.78rem;color:var(--t2);margin-bottom:12px">共 ${items.length} 个商品 · ${items.map(p=>p.name).join(' + ')}</div>
  <div class="result-grid">${totals.map(t=>`
    <div class="result-row${t.total===minTotal?' winner':''}">
      <div>
        <div class="r-plat"><span class="plat-badge ${t.cls}">${t.name}</span>${t.total===minTotal?' 🏆 <span style="color:var(--g);font-weight:600">最低价</span>':''}</div>
        <div class="r-items">${items.map(p=>p.name).join(' · ')}</div>
      </div>
      <div style="text-align:right">
        <div class="r-total">¥${t.total.toLocaleString()}</div>
        ${t.total>minTotal?`<div class="r-save">比最低贵 ¥${(t.total-minTotal).toLocaleString()}</div>`:'<div class="r-save">最优选择 ✨</div>'}
      </div>
    </div>
  `).join('')}</div>`;
}

// ============ ACTIONS ============
function toggleFilter(cat){
  if(cat==='all'){activeFilters.clear();}
  else{if(activeFilters.has(cat))activeFilters.delete(cat);else activeFilters.add(cat)}
  renderPills();renderProducts();
}
function toggleSelect(idx){
  const pos = selected.indexOf(idx);
  if(pos>=0)selected.splice(pos,1);else if(selected.length<6)selected.push(idx);
  renderProducts();renderCompare();
  document.getElementById('cpResult').classList.remove('show');
}
function removeItem(idx){
  const pos = selected.indexOf(idx);
  if(pos>=0)selected.splice(pos,1);
  renderProducts();renderCompare();
  document.getElementById('cpResult').classList.remove('show');
}
function clearAll(){selected=[];renderProducts();renderCompare();document.getElementById('cpResult').classList.remove('show')}

// Search
document.getElementById('searchInput').addEventListener('input',e=>{
  searchQuery=e.target.value;renderProducts();
});

// Countdown
function updateCountdown(){
  const now = new Date();
  const h = now.getHours();
  const nextH = h<12?12:24;
  const next = new Date(now);next.setHours(nextH,0,0,0);
  const diff = next-now;
  const hh = Math.floor(diff/3600000);
  const mm = Math.floor((diff%3600000)/60000);
  document.getElementById('countdown').textContent = `下次更新: ${hh}h ${mm}m`;
}
setInterval(updateCountdown,60000);updateCountdown();

const now = new Date();
document.getElementById('updateTime').textContent =
  `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:00`;

// Init
renderPills();
renderProducts();
renderCompare();
</script>

.compare-panel .subtitle{font-size:0.8rem;color:var(--text2);margin-bottom:20px}
.compare-slots{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:20px}
.compare-slot{background:var(--bg-card);border:1px dashed var(--border);border-radius:var(--radius-sm);padding:20px;text-align:center;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:var(--tr);position:relative}

    name:'穿戴',icon:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="7"/><polyline points="12 7 12 12 15 15"/></svg>',
    items:[
      {name:'Apple Watch Ultra 3',pdd:5799,tb:5599,jd:5899,delta:[0,-200,0]},
      {name:'Apple Watch S11',pdd:2699,tb:2799,jd:2899,delta:[0,0,0]},
      {name:'华为 Watch GT 6',pdd:1488,tb:1588,jd:1688,delta:[-50,0,0]},
      {name:'小米手环 10',pdd:249,tb:269,jd:279,delta:[0,0,0]},
      {name:'佳明 Fenix 9',pdd:5980,tb:6280,jd:6480,delta:[0,0,0]},
    ]
  },
  tablet: {
    name:'平板',icon:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>',
    items:[
      {name:'iPad Pro M5 11"',pdd:7599,tb:7999,jd:8299,delta:[0,0,0]},
      {name:'iPad Air M4 11"',pdd:4599,tb:4799,jd:4999,delta:[-100,0,0]},
      {name:'华为 MatePad Pro 12.2',pdd:4099,tb:4299,jd:4499,delta:[0,0,0]},
      {name:'小米平板 8',pdd:2599,tb:2799,jd:2899,delta:[-100,0,0]},
      {name:'三星 Tab S11',pdd:5499,tb:5799,jd:5999,delta:[0,0,0]},
    ]
  }
};

// ============ STATE ============
let activeCat = 'phone';
let compareList = [];
let sortKey = 'lowest';
let sortAsc = true;
let searchQuery = '';

// ============ RENDER ============
function renderSidebar(){
  const list = document.getElementById('catList');
  list.innerHTML = Object.entries(priceData).map(([key,cat])=>`
    <button class="cat-item${key===activeCat?' active':''}" onclick="switchCat('${key}')">
      <span class="cat-dot"></span>${cat.icon} ${cat.name}
      <span class="cat-count">${cat.items.length}</span>
    </button>
  `).join('');
}

function renderTable(){
  const cat = priceData[activeCat];
  let items = [...cat.items];
  if(searchQuery){
    const q = searchQuery.toLowerCase();
    items = items.filter(i=>i.name.toLowerCase().includes(q));
  }
  items.sort((a,b)=>{
    let va,vb;
    if(sortKey==='name'){va=a.name;vb=b.name;return sortAsc?va.localeCompare(vb):vb.localeCompare(va)}
    if(sortKey==='lowest'){va=Math.min(a.pdd,a.tb,a.jd);vb=Math.min(b.pdd,b.tb,b.jd)}
    else{va=a[sortKey];vb=b[sortKey]}
    return sortAsc?va-vb:vb-va;
  });

  const tbody = document.getElementById('priceBody');
  tbody.innerHTML = items.map((item,i)=>{
    const min = Math.min(item.pdd,item.tb,item.jd);
    const platforms = [
      {key:'pdd',name:'拼多多',cls:'badge-pdd',val:item.pdd},
      {key:'tb',name:'淘宝',cls:'badge-tb',val:item.tb},
      {key:'jd',name:'京东',cls:'badge-jd',val:item.jd},
    ];
    const lowest = platforms.filter(p=>p.val===min);
    const itemKey = `${activeCat}-${i}`;
    const selected = compareList.includes(itemKey);
    return `<tr class="${selected?'selected':''}" onclick="toggleCompare('${itemKey}')" data-key="${itemKey}">
      <td>${cat.icon} ${item.name}</td>
      <td class="price-cell${item.pdd===min?' price-low':' price-high'}">¥${item.pdd.toLocaleString()}${renderDelta(item.delta[0])}</td>
      <td class="price-cell${item.tb===min?' price-low':' price-high'}">¥${item.tb.toLocaleString()}${renderDelta(item.delta[1])}</td>
      <td class="price-cell${item.jd===min?' price-low':' price-high'}">¥${item.jd.toLocaleString()}${renderDelta(item.delta[2])}</td>
      <td>${lowest.map(p=>`<span class="platform-badge ${p.cls}">${p.name}</span> ¥${p.val.toLocaleString()}`).join('<br>')}</td>
    </tr>`;
  }).join('');
}

function renderDelta(d){
  if(!d||d===0)return '';
  const cls = d<0?'down':'up';
  const arrow = d<0?'↓':'↑';
  return `<span class="price-delta ${cls}">${arrow}${Math.abs(d)}</span>`;
}

function renderCompare(){
  const slots = document.getElementById('compareSlots');
  const result = document.getElementById('compareResult');
  const maxSlots = 3;
  const html = [];
  for(let i=0;i<maxSlots;i++){
    if(i<compareList.length){
      const [catKey,idx] = compareList[i].split('-');
      const item = priceData[catKey].items[parseInt(idx)];
      const cat = priceData[catKey];
      html.push(`<div class="compare-slot filled">
        <button class="remove-btn" onclick="event.stopPropagation();removeCompare(${i})">✕</button>
        <div class="slot-product">${cat.icon} ${item.name}</div>
        <div class="slot-prices">
          <span class="slot-price"><span class="platform-badge badge-pdd">拼多多</span> ¥${item.pdd}</span>
          <span class="slot-price"><span class="platform-badge badge-tb">淘宝</span> ¥${item.tb}</span>
          <span class="slot-price"><span class="platform-badge badge-jd">京东</span> ¥${item.jd}</span>
        </div>
      </div>`);
    } else {
      html.push(`<div class="compare-slot"><span class="slot-hint">+ 点击表格添加</span></div>`);
    }
  }
  slots.innerHTML = html.join('');

  // Result
  if(compareList.length>=2){
    result.classList.add('show');
    // Calculate best platform for each
    const platforms = ['pdd','tb','jd'];
    const platformNames = {pdd:'拼多多',tb:'淘宝',jd:'京东'};
    const platformClasses = {pdd:'badge-pdd',tb:'badge-tb',jd:'badge-jd'};
    const totals = platforms.map(p=>{
      let sum=0,names=[];
      compareList.forEach(key=>{
        const [ck,i]=key.split('-');
        const item = priceData[ck].items[parseInt(i)];
        sum+=item[p];
        names.push(item.name);
      });
      return {platform:p,name:platformNames[p],cls:platformClasses[p],total:sum,items:names};
    });
    const minTotal = Math.min(...totals.map(t=>t.total));
    result.innerHTML = `<h4>📊 对比结果：<span style="color:var(--cyan)">${compareList.map(k=>{const[ck,i]=k.split('-');return priceData[ck].items[parseInt(i)].name}).join(' vs ')}</span></h4>
    <div class="result-grid">${totals.map(t=>{
      const saving = t.total-minTotal;
      return `<div class="result-card">
        <div class="platform"><span class="platform-badge ${t.cls}">${t.name}</span>${t.total===minTotal?' 🏆 最低':''}</div>
        <div class="saving">¥${t.total.toLocaleString()}</div>
        <div class="detail">${saving>0?`比最低价贵 ¥${saving.toLocaleString()}`:'全网最低价'}</div>
      </div>`;
    }).join('')}</div>`;
  } else {
    result.classList.remove('show');
    result.innerHTML = '';
  }
}

// ============ ACTIONS ============
function switchCat(key){
  activeCat=key;
  renderSidebar();
  renderTable();
}

function toggleCompare(itemKey){
  const idx = compareList.indexOf(itemKey);
  if(idx>=0){compareList.splice(idx,1)}
  else if(compareList.length<3){compareList.push(itemKey)}
  renderTable();
  renderCompare();
}

function removeCompare(i){compareList.splice(i,1);renderTable();renderCompare()}
function clearCompare(){compareList=[];renderTable();renderCompare()}

// Sort
document.addEventListener('click',e=>{
  const th = e.target.closest('th');
  if(!th)return;
  const key = th.dataset.sort;
  if(!key)return;
  if(sortKey===key){sortAsc=!sortAsc}else{sortKey=key;sortAsc=true}
  document.querySelectorAll('th').forEach(h=>h.classList.remove('sorted'));
  th.classList.add('sorted');
  renderTable();
});

// Search
document.getElementById('searchInput').addEventListener('input',e=>{
  searchQuery = e.target.value;
  renderTable();
});

// Countdown
function updateCountdown(){
  const now = new Date();
  const updateHour = now.getHours()<12?12:24;
  const next = new Date(now);next.setHours(updateHour,0,0,0);
  if(now.getHours()>=12)next.setDate(next.getDate()+(updateHour===12?1:0));
  const diff = next-now;
  const h = Math.floor(diff/3600000);
  const m = Math.floor((diff%3600000)/60000);
  document.getElementById('countdown').textContent = `下次更新: ${h}h ${m}m`;
}
setInterval(updateCountdown,60000);
updateCountdown();

// Update time
const now = new Date();
document.getElementById('updateTime').textContent =
  `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:00`;

// Init
renderSidebar();
renderTable();
renderCompare();
</script>
